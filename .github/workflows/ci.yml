name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  precommit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Run pre-commit
        run: |
          pre-commit run --all-files

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: |
          pytest -q

  snapshot:
    name: Streamlit snapshot
    runs-on: ubuntu-latest
    needs: [precommit, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps || playwright install
      - name: Start Streamlit (background)
        run: |
          nohup streamlit run streamlit_app.py --server.port 8501 --server.headless true > run/streamlit_ci.log 2>&1 &
          sleep 6
      - name: Run snapshot playwright script
        run: |
          python tools/ci/snapshot_playwright.py --url http://127.0.0.1:8501 --out run/streamlit_snapshot.png
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-snapshot
          path: run/streamlit_snapshot.png
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Flask
          pip install pip-audit detect-secrets

      - name: Run tests
        run: |
          pytest -q

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan > secrets_scan.txt

      - name: Upload detect-secrets results
        uses: actions/upload-artifact@v4
        with:
          name: secrets_scan
          path: secrets_scan.txt

      - name: Run paper-trader unit tests separately
        run: |
          pytest -q tests/test_paper_trader.py -q

      - name: Run snapshot monitor (smoke)
        run: |
          # run monitor with a high threshold so it does not alert during CI
          python tools/snapshot_monitor.py --threshold 10080 || true

      - name: Lint
        run: |
          pip install flake8
          flake8 . --exclude .venv --max-line-length=120 || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Flask
          pip install pip-audit detect-secrets

      - name: Run tests
        run: |
          pytest -q

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --exclude .venv --max-line-length=120 || true

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy --config-file mypy.ini . || true
