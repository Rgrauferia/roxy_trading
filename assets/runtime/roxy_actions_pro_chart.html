
    <div class="roxy-pro-chart" id="__CHART_ID__">
      <header class="rpc-head">
        <div>
          <span class="rpc-kicker">GRAFICA OPERATIVA</span>
          <strong data-rpc-title></strong>

        <aside data-rpc-last></aside>
      </header>

	        <button data-range="all">Todo</button>

    </div>
    <style>
      html,body{margin:0;background:transparent;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#e5f3ff}
      .roxy-pro-chart{height:calc(100vh - 2px);display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(96,165,250,.34);border-radius:16px;background:radial-gradient(circle at 48% 10%,rgba(14,165,233,.22),transparent 32%),radial-gradient(circle at 12% 92%,rgba(34,197,94,.10),transparent 34%),linear-gradient(180deg,rgba(4,10,22,.98),rgba(2,6,23,.97));box-shadow:0 0 0 1px rgba(255,255,255,.045) inset,0 18px 38px rgba(0,0,0,.42),0 0 42px rgba(14,165,233,.10)}

      .rpc-reading .ready{border-color:rgba(34,197,94,.34);box-shadow:0 0 22px rgba(34,197,94,.10) inset}.rpc-reading .ready small,.rpc-reading .ready b{color:#86efac}

      .rpc-level-band b{border-radius:999px;padding:3px 7px;background:rgba(2,6,23,.76);box-shadow:0 0 18px rgba(0,0,0,.24);font-variant-numeric:tabular-nums}
      .rpc-level-entry{background:linear-gradient(90deg,rgba(34,197,94,.025),rgba(34,197,94,.11),rgba(34,197,94,.03));border-color:rgba(34,197,94,.42);color:#bbf7d0}
      .rpc-level-stop{background:linear-gradient(90deg,rgba(239,68,68,.02),rgba(239,68,68,.10),rgba(239,68,68,.025));border-color:rgba(248,113,113,.44);color:#fecaca}
      .rpc-level-target{background:linear-gradient(90deg,rgba(56,189,248,.02),rgba(56,189,248,.10),rgba(56,189,248,.025));border-color:rgba(125,211,252,.44);color:#bae6fd}
      .rpc-crosscard{position:absolute;left:16px;top:16px;z-index:5;display:none;min-width:190px;padding:8px 10px;border:1px solid rgba(125,211,252,.32);border-left:3px solid #38bdf8;border-radius:10px;background:rgba(2,6,23,.78);backdrop-filter:blur(10px);box-shadow:0 14px 28px rgba(0,0,0,.34);font-size:11px;font-weight:850;line-height:1.35;color:#dbeafe}
      .rpc-crosscard b{color:#f8fafc}
      .rpc-plan{position:absolute;right:14px;bottom:58px;z-index:4;max-width:236px;padding:8px 10px;border:1px solid rgba(34,197,94,.25);border-left:3px solid #22c55e;border-radius:12px;background:rgba(2,6,23,.58);backdrop-filter:blur(10px);box-shadow:0 14px 28px rgba(0,0,0,.22);font-size:10px;font-weight:850;line-height:1.34;color:#dbeafe;pointer-events:none;opacity:.76;transition:opacity .18s ease,transform .18s ease}
      .rpc-stage[data-layer-mode="clean"] .rpc-plan{opacity:0;transform:translateY(8px)}
      .rpc-stage[data-layer-mode="all"] .rpc-plan{opacity:.82}
      .rpc-plan strong{display:block;color:#fff;font-size:12px;margin-bottom:4px}
      .rpc-plan span{display:grid;grid-template-columns:78px 1fr;gap:8px;color:#a7bce0}
      .rpc-plan b{color:#f8fafc;text-align:right}
	      .rpc-statusbar{position:absolute;left:16px;right:16px;bottom:10px;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid rgba(125,211,252,.18);border-radius:10px;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);padding:7px 9px;color:#9fb8da;font-size:10px;font-weight:900;pointer-events:none}
	      .rpc-statusbar b{color:#e0f2fe}.rpc-statusbar em{font-style:normal;color:#22c55e}.rpc-statusbar .rpc-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.9);animation:rpcLiveDot 1.2s ease-in-out infinite}
      .rpc-statusbar.rpc-near-entry{border-color:rgba(34,197,94,.42);box-shadow:0 0 24px rgba(34,197,94,.16)}
      .rpc-statusbar.rpc-danger{border-color:rgba(248,113,113,.46);box-shadow:0 0 24px rgba(248,113,113,.14)}
      .rpc-statusbar.rpc-closed{border-color:rgba(250,204,21,.36);box-shadow:0 0 24px rgba(250,204,21,.10)}
      .rpc-statusbar.rpc-degraded{border-color:rgba(248,113,113,.42);box-shadow:0 0 24px rgba(248,113,113,.12)}
      .rpc-statusbar.rpc-closed .rpc-dot{background:#facc15;box-shadow:0 0 12px rgba(250,204,21,.9)}
      .rpc-statusbar.rpc-degraded .rpc-dot{background:#fb7185;box-shadow:0 0 12px rgba(251,113,133,.9)}
	      .rpc-legend{display:flex;gap:9px;align-items:center;overflow-x:auto;padding:8px 10px 10px;border-top:1px solid rgba(96,165,250,.14);white-space:nowrap}
      .rpc-legend b{display:inline-flex;align-items:center;gap:5px;color:#bfd7ff;font-size:10px;font-weight:900}
      .rpc-legend i{display:block;width:18px;height:3px;border-radius:99px;box-shadow:0 0 10px currentColor}
      @keyframes rpcLiveDot{0%,100%{opacity:.45;transform:scale(.9)}50%{opacity:1;transform:scale(1.18)}}
      @keyframes rpcPriceFlashUp{0%{transform:translateY(0) scale(1)}45%{transform:translateY(-2px) scale(1.045)}100%{transform:translateY(0) scale(1)}}
      @keyframes rpcPriceFlashDown{0%{transform:translateY(0) scale(1)}45%{transform:translateY(2px) scale(1.045)}100%{transform:translateY(0) scale(1)}}
      @keyframes rpcPriceFlashFlat{0%{transform:scale(1)}45%{transform:scale(1.035)}100%{transform:scale(1)}}
	      @media(max-width:720px){.rpc-head{padding:9px 10px 6px}.rpc-head strong{font-size:15px}.rpc-head aside{font-size:15px}.rpc-toolbar span{display:none}.rpc-tradebar{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.rpc-tradebar span{padding:6px 7px}.rpc-tradebar b{font-size:11px}.rpc-reading{grid-template-columns:1fr 1fr;gap:6px}.rpc-reading b{font-size:11px}.rpc-stage{min-height:560px}.rpc-plan{display:none}.rpc-crosscard{max-width:calc(100% - 32px)}.rpc-chart{inset:6px 7px 64px 7px}.rpc-level-bands{inset:6px 7px 64px}.rpc-stage:before,.rpc-stage:after{inset:6px 7px 64px}.rpc-statusbar{left:12px;right:12px;bottom:8px;font-size:8px;display:block}.rpc-statusbar em{display:block;margin-top:2px}.rpc-legend{padding-bottom:8px}.rpc-legend b{font-size:9px}}
    </style>
    <script>
    (() => {
      const ensureLightweightCharts = async () => {
        if (window.LightweightCharts) return true;
        const inlineSource = __LIGHTWEIGHT_INLINE__;
        if (inlineSource) {
          try {
            const script = document.createElement("script");
            script.textContent = inlineSource;
            document.head.appendChild(script);
            if (window.LightweightCharts) return true;
          } catch (error) {}
        }
        try {
          await new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = "https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js";
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
        } catch (error) {}
        return Boolean(window.LightweightCharts);
      };
      const payload = __PAYLOAD__;
      const root = document.getElementById("__CHART_ID__");
      const chartEl = root.querySelector(".rpc-chart");
      const stageEl = root.querySelector("[data-rpc-stage]");
      const crossEl = root.querySelector("[data-rpc-cross]");
      const planEl = root.querySelector("[data-rpc-plan]");
      const statusEl = root.querySelector("[data-rpc-status]");
      const tradebarEl = root.querySelector("[data-rpc-tradebar]");
      const readingEl = root.querySelector("[data-rpc-reading]");
      const levelBandsEl = root.querySelector("[data-rpc-level-bands]");
      const titleEl = root.querySelector("[data-rpc-title]");
      const subtitleEl = root.querySelector("[data-rpc-subtitle]");
      const lastEl = root.querySelector("[data-rpc-last]");
      const candles = payload.candles || [];
      const boot = async () => {
      if (!await ensureLightweightCharts() || !candles.length) {
        chartEl.innerHTML = "<div style='padding:18px;color:#fecaca'>No se pudo cargar la grafica profesional.</div>";
        return;
      }
      const fmt = (v) => Number(v).toLocaleString("en-US", {minimumFractionDigits: Number(v) >= 1 ? 2 : 4, maximumFractionDigits: Number(v) >= 1 ? 2 : 6});
      const positivePrice = (value) => {
        if (value === null || value === undefined || value === "") return NaN;
        const parsed = Number(value);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : NaN;
      };
      const pct = (price, base) => {
        const p = Number(price);
        const b = Number(base);
        return Number.isFinite(p) && Number.isFinite(b) && b > 0 ? (p - b) / b : 0;
      };
      let displayedLastPrice = null;
      const setLastBadge = (price, base, source = "historial", options = {}) => {
        const move = pct(price, base);
        const previousDisplayed = Number(displayedLastPrice);
        const tickMove = Number.isFinite(previousDisplayed) ? Number(price) - previousDisplayed : 0;
        displayedLastPrice = Number(price);
        const badge = options.degraded ? "RESPALDO" : options.closed ? "LAST" : options.live ? "LIVE" : "QUOTE";
        lastEl.innerHTML = `${badge} ${fmt(price)}<small>${move >= 0 ? "+" : ""}${(move * 100).toFixed(2)}% · ${source}</small>`;
        lastEl.style.color = options.degraded ? "#38bdf8" : options.closed ? "#facc15" : move >= 0 ? "#22c55e" : "#fb7185";
        lastEl.classList.remove("rpc-flash-up", "rpc-flash-down", "rpc-flash-flat", "rpc-closed", "rpc-degraded");
        if (options.closed) lastEl.classList.add("rpc-closed");
        if (options.degraded) lastEl.classList.add("rpc-degraded");
        void lastEl.offsetWidth;
        lastEl.classList.add(tickMove > 0 ? "rpc-flash-up" : tickMove < 0 ? "rpc-flash-down" : "rpc-flash-flat");
      };
	      const renderTradebar = (price, source = "historial") => {
	        if (!tradebarEl) return;
	        const summary = payload.roxySummary || {};
	        const entry = positivePrice(summary.entry);
	        const stop = positivePrice(summary.stop);
	        const target = positivePrice(summary.target);
	        const rr = positivePrice(summary.rr);
	        const live = positivePrice(price);
	        const nearEntry = Number.isFinite(live) && Number.isFinite(entry) && Math.abs(live - entry) <= Math.max(Math.abs(entry) * .0035, .02);
	        const nearStop = Number.isFinite(live) && Number.isFinite(stop) && Math.abs(live - stop) <= Math.max(Math.abs(stop) * .0035, .02);
	        tradebarEl.innerHTML = `
	          <span class="blue"><small>Precio live</small><b>${Number.isFinite(live) ? fmt(live) : "--"}</b></span>
	          <span class="good"><small>${nearEntry ? "En zona entrada" : "Entrada"}</small><b>${Number.isFinite(entry) ? fmt(entry) : "Pendiente"}</b></span>
	          <span class="danger"><small>${nearStop ? "Cerca del stop" : "Stop"}</small><b>${Number.isFinite(stop) ? fmt(stop) : "Pendiente"}</b></span>
	          <span class="blue"><small>Target</small><b>${Number.isFinite(target) ? fmt(target) : "Pendiente"}</b></span>
	          <span><small>Feed</small><b>${String(source || "historial").slice(0, 26)}</b></span>
	        `;
        if (Number.isFinite(rr)) {
          const last = tradebarEl.lastElementChild;
          if (last) last.innerHTML = `<small>R/R · Feed</small><b>1:${rr.toFixed(1)} · ${String(source || "historial").slice(0, 18)}</b>`;
        }
      };
      const renderReading = (price, source = "historial") => {
        if (!readingEl) return;
        const summary = payload.roxySummary || {};
        const live = positivePrice(price);
        const entry = positivePrice(summary.entry);
        const stop = positivePrice(summary.stop);
        const target = positivePrice(summary.target);
        const zoneLow = positivePrice(summary.entryZoneLow);
        const zoneHigh = positivePrice(summary.entryZoneHigh);
        const hasZone = Number.isFinite(zoneLow) && Number.isFinite(zoneHigh) && zoneHigh > zoneLow;
        const near = (value, ratio = .0035) => Number.isFinite(live) && Number.isFinite(value) && Math.abs(live - value) <= Math.max(Math.abs(value) * ratio, .02);
        const hasCompletePlan = Number.isFinite(entry) && Number.isFinite(stop) && Number.isFinite(target);
        let state = hasCompletePlan ? "Esperar confirmacion" : "Plan pendiente";
        let tone = "wait";
        let detail = hasCompletePlan
          ? "Roxy espera alineacion limpia antes de entrada."
          : "Sin entrada, stop y objetivo verificables; Roxy no emite una decision.";
        if (hasCompletePlan && Number.isFinite(live) && live <= stop * 1.002) {
          state = "No entrar";
          tone = "danger";
          detail = "Precio demasiado cerca del stop o debajo de invalidacion.";
        } else if (hasCompletePlan && Number.isFinite(live) && live >= target * .995) {
          state = "Tomar ganancia / no perseguir";
          tone = "wait";
          detail = "Precio ya esta cerca del target planeado.";
        } else if (hasCompletePlan && hasZone && live >= zoneLow && live <= zoneHigh) {
          state = "Zona de entrada";
          tone = "ready";
          detail = "Precio dentro de la zona operativa de Roxy.";
        } else if (hasCompletePlan && near(entry, .004)) {
          state = "Entrada posible";
          tone = "ready";
          detail = "Precio tocando entrada; confirmar vela y volumen.";
        } else if (hasCompletePlan && Number.isFinite(live) && live < entry) {
          state = "Esperar pullback";
          tone = "wait";
          detail = "Aun no llega a la entrada calculada.";
        } else if (hasCompletePlan && Number.isFinite(live) && live > entry) {
          state = "Gestionar";
          tone = "ready";
          detail = "Precio sobre entrada; vigilar stop y target.";
        }
        const distanceToEntry = Number.isFinite(live) && Number.isFinite(entry) ? live - entry : NaN;
        const distanceLabel = Number.isFinite(distanceToEntry) ? `${distanceToEntry >= 0 ? "+" : ""}${fmt(distanceToEntry)}` : "--";
        readingEl.innerHTML = `
          <span class="${tone}"><small>Lectura Roxy · modo trading limpio</small><b>${state}</b><em>${detail}</em></span>

	              ? `${quote.source} · ultimo precio real`
	              : quote.source;
	        setLastBadge(price, previous.close, feedLabel, { live: !isClosed && !isDegraded, closed: isClosed, degraded: isDegraded });
	        renderTradebar(price, feedLabel);
	        renderReading(price, feedLabel);
	        applySmartScale(price);
          window.setTimeout(updateLevelBands, 40);
	        if (statusEl) {
		          const stateText = isClosed ? " · mercado cerrado" : "";
	          const summary = payload.roxySummary || {};
	          const entry = positivePrice(summary.entry);
	          const stop = positivePrice(summary.stop);
	          const nearEntry = Number.isFinite(entry) && Math.abs(price - entry) <= Math.max(Math.abs(entry) * .0035, .02);
	          const nearStop = Number.isFinite(stop) && Math.abs(price - stop) <= Math.max(Math.abs(stop) * .0035, .02);
	          statusEl.classList.toggle("rpc-near-entry", nearEntry);
	          statusEl.classList.toggle("rpc-danger", nearStop);
	          statusEl.classList.toggle("rpc-closed", Boolean(isClosed));
	          statusEl.classList.toggle("rpc-degraded", Boolean(isDegraded));
	          const feedStatus = isDegraded ? "Feed pendiente" : isBackup ? "Feed respaldo real" : isClosed ? "Ultimo precio real" : "Live real";
	          const feedExplain = isDegraded
	            ? "Roxy conserva la ultima vela/precio real y espera un quote nuevo; no simula ticks."
	            : isBackup
	              ? "Roxy usa un quote real de respaldo y mantiene la grafica sincronizada mientras reconecta el stream."
	            : isClosed
	              ? "Mercado cerrado: Roxy no simula ticks; el movimiento live vuelve cuando abra la sesion."
	              : nearEntry
	                ? "Precio entrando en zona de entrada Roxy."
	                : nearStop
	                  ? "Atencion: precio cerca del stop."
	                  : "Precio sincronizado sobre la vela actual sin salir de la pagina.";
		          statusEl.innerHTML = `<span><span class="rpc-dot"></span><b>${feedStatus}:</b> ${quote.source}${stateText} · ${quote.updatedAt || new Date().toLocaleTimeString()}</span><em>${feedExplain}</em>`;
		        }
      };
      try {
        const parentDoc = window.parent && window.parent.document ? window.parent.document : null;
        if (parentDoc) {
          parentDoc.addEventListener("roxy-stock-quote", (event) => {
            const detail = event && event.detail ? event.detail : {};
            const eventSymbol = String(detail.symbol || (detail.quote && detail.quote.symbol) || "").toUpperCase();
            if (eventSymbol !== String(payload.symbol || "").toUpperCase()) return;
            syncLiveQuote(detail.quote || detail);
          });
        }
      } catch (error) {}
      syncLiveQuote();
      window.setInterval(syncLiveQuote, 2500);
      };
      boot();
    })();
    </script>
