          editDrag = {
            mode: "handle",
            pointIndex: Number(handle.getAttribute("data-handle-index")) || 1,
            drawingIndex: selectedDrawingIndex,
            originalSnapshot: drawingsSnapshot(),
          };
          drawLayer.setPointerCapture(event.pointerId);
          if (toolReadout) toolReadout.textContent = `Editando punto ${editDrag.pointIndex}`;
          return;
        }
        const target = event.target && event.target.closest ? event.target.closest("[data-roxy-drawing='true']") : null;
        const targetIndex = target ? Number(target.getAttribute("data-drawing-index")) : NaN;
        if (activeTool === "eraser") {
          if (Number.isInteger(targetIndex)) deleteDrawing(targetIndex);
          return;
        }
        if (Number.isInteger(targetIndex)) {
          selectDrawing(targetIndex);
          if (activeTool === "select" && drawings[targetIndex]) {
            editDrag = {
              mode: "move",
              drawingIndex: targetIndex,
              startX: event.clientX,
              startY: event.clientY,
              originalShape: Object.assign({}, drawings[targetIndex]),
              originalSnapshot: drawingsSnapshot(),
            };
            drawLayer.setPointerCapture(event.pointerId);
            if (toolReadout) toolReadout.textContent = "Moviendo dibujo";
          }
          return;
        }
        if (activeTool === "select") {
          selectDrawing(null);
          return;
        }
        removePreview();
        drawStart = pointFromEvent(event);
        setSnapCue(drawStart);
        drawLayer.setPointerCapture(event.pointerId);
      });
      drawLayer.addEventListener("pointermove", (event) => {
        if (!editDrag && !drawStart && navigationTools.has(activeTool)) {
          showRoxyCursor(event);
          return;
        }
        if (editDrag && drawings[editDrag.drawingIndex]) {
          event.preventDefault();
          const shape = drawings[editDrag.drawingIndex];
          if (editDrag.mode === "handle") {
            const point = pointFromEvent(event);
            updateShapePoint(shape, editDrag.pointIndex, point);
            setSnapCue(point);
            if (toolReadout) {
              const priceText = Number.isFinite(Number(point.price)) ? fmt(Number(point.price)) : "--";
              toolReadout.textContent = `Punto ${editDrag.pointIndex} @ ${priceText}`;
            }
          } else if (editDrag.mode === "move") {
            moveShapeByPixels(shape, editDrag.originalShape, event.clientX - editDrag.startX, event.clientY - editDrag.startY);
            if (toolReadout) toolReadout.textContent = "Moviendo dibujo";
          }
          renderDrawings();
          return;
        }
        if (!drawStart || navigationTools.has(activeTool) || activeTool === "select") return;
        const end = pointFromEvent(event);
        setSnapCue(end);
        removePreview();
        const shape = drawingShapeFromPoints(drawStart, end, activeTool);
        previewNode = addDrawingNode(shape, false, true);
        if (toolReadout) {
          if (activeTool === "measure") {
            const summary = measureSummaryFromPoints(drawStart, end);
            toolReadout.textContent = `${summary.pctText} | ${summary.priceText} | ${summary.barsText}`;
            return;
          }
          const priceText = Number.isFinite(Number(end.price)) ? fmt(Number(end.price)) : "--";
          const snapText = end.snappedTo ? ` · snap ${end.snappedTo}` : "";
          toolReadout.textContent = `${activeTool} @ ${priceText}${snapText}`;
        }
      });
      drawLayer.addEventListener("pointerup", (event) => {
        if (editDrag) {
          event.preventDefault();
          if (editDrag.originalSnapshot && editDrag.originalSnapshot !== drawingsSnapshot()) {
            pushDrawingHistory(editDrag.originalSnapshot);
          }
          saveDrawings();
          try { drawLayer.releasePointerCapture(event.pointerId); } catch (error) {}
          if (toolReadout) toolReadout.textContent = "Dibujo actualizado";
          editDrag = null;
          clearSnapCue();
          return;
        }
        if (!drawStart || navigationTools.has(activeTool) || activeTool === "select") return;
        event.preventDefault();
        const end = pointFromEvent(event);
        removePreview();
        const shape = drawingShapeFromPoints(drawStart, end, activeTool);
        if (activeTool === "text") {
          const text = window.prompt("Texto para la grafica", "Entrada / salida") || "Nota";
          shape.text = text;
        }
        addDrawingNode(shape, true);
        selectedDrawingIndex = drawings.length - 1;
        renderDrawings();
        if (toolReadout) {
          if (activeTool === "measure") {
            const summary = measureSummaryFromPoints(drawStart, end);
            toolReadout.textContent = `${summary.pctText} | ${summary.priceText} | ${summary.barsText}`;
          } else {
            const priceText = Number.isFinite(Number(shape.price2 || shape.price1)) ? ` @ ${fmt(Number(shape.price2 || shape.price1))}` : "";
            toolReadout.textContent = `${activeTool}${priceText}`;
          }
        }
        try { drawLayer.releasePointerCapture(event.pointerId); } catch (error) {}
        clearSnapCue();
        drawStart = null;
      });
      drawLayer.addEventListener("pointercancel", (event) => {
        removePreview();
        try { drawLayer.releasePointerCapture(event.pointerId); } catch (error) {}
        if (manualNavDrag && manualNavDrag.pointerId === event.pointerId) manualNavDrag = null;
        editDrag = null;
        clearSnapCue();
        drawStart = null;
      });
      drawLayer.addEventListener("pointerleave", () => {
        if (!editDrag && !drawStart) hideRoxyCursor();
      });
      window.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          if (drawingsLocked) {
            if (toolReadout) toolReadout.textContent = event.shiftKey ? "Desbloquea para rehacer" : "Desbloquea para deshacer";
            return;
          }
          if (event.shiftKey) redoDrawings();
          else undoDrawings();
          return;
        }
        if ((event.key === "Backspace" || event.key === "Delete") && selectedDrawingIndex != null) {
          event.preventDefault();
          if (drawingsLocked) {
            if (toolReadout) toolReadout.textContent = "Desbloquea para borrar";
            return;
          }
          deleteDrawing(selectedDrawingIndex);
        }
        if (event.key === "Escape") {
          selectedDrawingIndex = null;
          renderDrawings();
          clearSnapCue();
          hideRoxyCursor();
        }
      });
      chart.subscribeCrosshairMove((param) => {
        if (!hoverCard || !param || !param.point || !param.time) {
          if (hoverCard) hoverCard.style.display = "none";
          renderQuoteLine(candles[candles.length - 1], "Ultima vela");
          if (suppressLinkedClear) {
            suppressLinkedClear = false;
          } else if (!applyingLinkedCrosshair && crosshairChannel) {
            crosshairChannel.postMessage({ source: crosshairInstanceId, timeframe: payload.timeframe, clear: true });
          }
          return;
        }
        const time = chartTimeToSeconds(param.time);
        const candle = candleByTime.get(Number(time));
        if (!candle) {
          hoverCard.style.display = "none";
          renderQuoteLine(candles[candles.length - 1], "Ultima vela");
          return;
        }
        const box = chartEl.getBoundingClientRect();
        const x = Math.min(Math.max(8, param.point.x + 14), Math.max(8, box.width - 260));
        const y = Math.min(Math.max(8, param.point.y + 14), Math.max(8, box.height - 116));
        const date = new Date(Number(candle.time) * 1000);
        const repeatsLinkedEvent = Number(lastLinkedCrosshairTime) === Number(candle.time);
        if (!applyingLinkedCrosshair && !repeatsLinkedEvent && crosshairChannel) {
          crosshairChannel.postMessage({
            source: crosshairInstanceId,
            timeframe: payload.timeframe,
            time: Number(candle.time),
          });
        }
        renderQuoteLine(candle, date.toLocaleString());
        hoverCard.style.display = "block";
        hoverCard.style.left = `${x}px`;
        hoverCard.style.top = `${y}px`;
        hoverCard.innerHTML = `<b>${payload.symbol}</b> <span>${date.toLocaleString()}</span><br>` +
          `O ${fmt(Number(candle.open))} · H ${fmt(Number(candle.high))}<br>` +
          `L ${fmt(Number(candle.low))} · C ${fmt(Number(candle.close))}<br>` +
          `<span>Vol ${fmt(Number(candle.volume || 0))}</span>`;
      });
	      if (crosshairChannel) {
	        crosshairChannel.addEventListener("message", (event) => {
	          const message = event && event.data;
	          if (!message || message.source === crosshairInstanceId) return;
	          applyingLinkedCrosshair = true;
	          try {
	            if (message.clear) {
	              suppressLinkedClear = true;
	              if (typeof chart.clearCrosshairPosition === "function") chart.clearCrosshairPosition();
	              root.dataset.linkedTimeframe = "";
	              if (crosshairLinkEl) {
	                crosshairLinkEl.dataset.state = "";
	                crosshairLinkEl.textContent = "Cursor enlazado";
	              }
	            } else {
	              const linkedCandle = nearestCandleByTime(message.time);
	              if (!linkedCandle) return;
	              lastLinkedCrosshairTime = Number(linkedCandle.time);
	              if (typeof chart.setCrosshairPosition === "function") {
	                chart.setCrosshairPosition(Number(linkedCandle.close), linkedCandle.time, candleSeries);
	              }
	              root.dataset.linkedTimeframe = String(message.timeframe || "");
	              if (crosshairLinkEl) {
	                crosshairLinkEl.dataset.state = "linked";
	                crosshairLinkEl.textContent = `Cursor ${message.timeframe || "otra grafica"} ↔ ${payload.timeframe}`;
	              }
	              renderQuoteLine(linkedCandle, new Date(Number(linkedCandle.time) * 1000).toLocaleString());
	            }
	          } finally {
	            window.requestAnimationFrame(() => { applyingLinkedCrosshair = false; });
	          }
	        });
	        window.addEventListener("pagehide", () => crosshairChannel.close(), { once: true });
	      }
	      const ro = new ResizeObserver(resizeChartNow);
      ro.observe(chartEl);
      restoreDrawings();
      updatePlanBadge();
      renderDrawings();
      requestAnimationFrame(drawBollingerCloud);
      if (payload.stream.enabled) {
        openKlineSocket();
        pollTicker();
        pollKlines();
        window.setInterval(pollTicker, payload.stream.tickerMs || 2000);
        window.setInterval(pollKlines, payload.stream.klineMs || 30000);
        window.addEventListener("beforeunload", () => {
          try {
            if (klineSocket) klineSocket.close(1000, "page unload");
          } catch (error) {}
        });
      } else {
        sourceEl.textContent = `${payload.stream.provider || payload.live.source || "quote + historial"} · streaming real de acciones requiere Alpaca/Polygon WebSocket durante mercado abierto.`;
      }
    })();
    </script>
